<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RNG Master Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style-core.css">
    <style>
        /* Force le corps de la page à faire exactement la taille de l'écran visible */
        html, body {
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
        }

        /* L'iframe doit défiler à l'intérieur s'il y a trop de contenu */
        #content-frame {
            flex: 1; /* Prend l'espace restant */
            width: 100%;
            border: none;
            overflow-y: auto;
        }

        /* La barre de navigation reste TOUJOURS visible en bas */
        .nav-bar {
            height: 70px;
            min-height: 70px;
            background: #121212;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            /* Protection pour la barre de navigation Android/iOS */
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.5;
        }

        .nav-item.active {
            opacity: 1;
            color: #2ecc71; /* Sera écrasé par le thème du jeu */
        }

        .nav-icon { font-size: 1.4rem; margin-bottom: 4px; }
    </style>
</head>
<body>

    <iframe src="pages/chrono.html" id="content-frame" name="content-frame"></iframe>

    <nav class="nav-bar">
        <a href="pages/config.html" target="content-frame" class="nav-item" onclick="setActive(this)">
            <span class="nav-icon">⚙️</span>
            <span>Config</span>
        </a>
        <a href="pages/search.html" target="content-frame" class="nav-item" onclick="setActive(this)">
            <span class="nav-icon">🔍</span>
            <span>Chercher</span>
        </a>
        <a href="pages/chrono.html" target="content-frame" class="nav-item active" onclick="setActive(this)">
            <span class="nav-icon">⏱️</span>
            <span>Chrono</span>
        </a>
    </nav>

    <script>
        // Fonction pour gérer l'état actif des boutons
        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        // Enregistrement du Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }
    </script>
</body>
</html>
