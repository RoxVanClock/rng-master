<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RNG Master Pro</title>
    <link rel="stylesheet" href="style-core.css">
    <style>
        /* FIX TOTAL POUR LE SCROLL */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            overflow: hidden; /* On bloque le body principal */
            display: flex;
            flex-direction: column;
        }

        /* La zone de contenu qui DOIT défiler */
        #main-content {
            flex: 1;
            overflow-y: auto; /* Le scroll se passe ICI */
            -webkit-overflow-scrolling: touch;
            padding-bottom: 20px;
        }

        .page-section { display: none; }
        .page-section.active { display: block; }

        .nav-bar {
            height: 70px;
            background: #121212;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            color: white; opacity: 0.4; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; flex: 1;
        }

        .nav-item.active { opacity: 1; color: var(--game-color); }
        .nav-icon { font-size: 1.5rem; }
    </style>
</head>
<body class="emerald">

    <div id="main-content">
        <section id="page-config" class="page-section">
            <div class="card">
                <h3>👤 Profil Dresseur</h3>
                <input type="text" id="p-name" placeholder="Nom du profil">
                <select id="p-game">
                    <option value="emerald">Émeraude</option>
                    <option value="ruby">Rubis / Saphir</option>
                    <option value="fr">Rouge Feu / Vert Feuille</option>
                </select>
                <input type="number" id="p-tid" placeholder="TID">
                <input type="number" id="p-sid" placeholder="SID">
                <button class="btn" onclick="saveProfile()">Enregistrer</button>
            </div>
        </section>

        <section id="page-chrono" class="page-section active">
            <div class="card" id="timer-card">
                <h2 style="text-align:center;">⏱️ <span id="timer-display">0.000</span></h2>
                <label>Frame Cible</label>
                <input type="number" id="target-frame" value="300">
                <div style="display:flex; gap:10px;">
                    <button class="btn" id="start-btn" onclick="toggleTimer()">DÉMARRER</button>
                    <button class="btn" style="background:#444;" onclick="resetTimer()">RESET</button>
                </div>
            </div>

            <div class="card">
                <h3>⚙️ Paramètres des Bips</h3>
                <label>Déclenchement (sec avant fin)</label>
                <input type="number" id="beep-start" value="2.0">
                <label>Nombre de bips</label>
                <input type="number" id="beep-count" value="5">
                <div style="display:flex; gap:20px; margin-top:10px;">
                    <label><input type="checkbox" id="sound-on" checked> 🔊 Son</label>
                    <label><input type="checkbox" id="vibe-on"> 📳 Vibreur</label>
                </div>
            </div>
            <div style="height: 100px;"></div> 
        </section>

        <section id="page-search" class="page-section">
            <div class="card">
                <h3>🔍 Chercher une Frame</h3>
                <button class="btn" onclick="alert('Calcul en cours...')">Lancer Recherche</button>
            </div>
        </section>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item" onclick="showPage('config', this)">
            <span class="nav-icon">⚙️</span><span>Config</span>
        </a>
        <a href="#" class="nav-item" onclick="showPage('search', this)">
            <span class="nav-icon">🔍</span><span>Chercher</span>
        </a>
        <a href="#" class="nav-item active" onclick="showPage('chrono', this)">
            <span class="nav-icon">⏱️</span><span>Chrono</span>
        </a>
    </nav>

    <script>
        // NAVIGATION SANS IFRAME
        function showPage(pageId, el) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            // Remonte le scroll en haut à chaque changement d'onglet
            document.getElementById('main-content').scrollTop = 0;
        }

        // LOGIQUE CHRONO SIMPLIFIÉE POUR TEST
        let isRunning = false;
        function toggleTimer() {
            isRunning = !isRunning;
            document.getElementById('start-btn').innerText = isRunning ? "STOP" : "DÉMARRER";
            if(isRunning) {
                document.getElementById('timer-card').classList.add('flashing');
            } else {
                document.getElementById('timer-card').classList.remove('flashing');
            }
        }
    </script>
</body>
</html>
