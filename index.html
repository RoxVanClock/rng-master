<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RNG Master Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style-core.css">
    <style>
        /* Structure bloquée à la taille de l'écran pour éviter les doubles barres de défilement */
        html, body {
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
        }

        /* L'iframe occupe tout l'espace restant */
        #content-frame {
            flex: 1;
            width: 100%;
            border: none;
            /* Support du défilement fluide sur iOS/Android */
            -webkit-overflow-scrolling: touch;
        }

        /* Barre de navigation ergonomique (Thumb Zone) */
        .nav-bar {
            height: 70px;
            min-height: 70px;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px); /* Effet de flou moderne */
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .nav-item {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.4;
            transition: 0.3s;
            flex: 1;
        }

        .nav-item.active {
            opacity: 1;
            color: var(--game-color, #2ecc71);
        }

        .nav-icon {
            font-size: 1.5rem;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <iframe src="pages/chrono.html" id="content-frame" name="content-frame"></iframe>

    <nav class="nav-bar">
        <a href="pages/config.html" target="content-frame" class="nav-item" onclick="setActive(this)">
            <span class="nav-icon">⚙️</span>
            <span>Config</span>
        </a>
        <a href="pages/search.html" target="content-frame" class="nav-item" onclick="setActive(this)">
            <span class="nav-icon">🔍</span>
            <span>Chercher</span>
        </a>
        <a href="pages/chrono.html" target="content-frame" class="nav-item active" onclick="setActive(this)">
            <span class="nav-icon">⏱️</span>
            <span>Chrono</span>
        </a>
    </nav>

    <script>
        /**
         * Gère le changement visuel des onglets
         */
        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        /**
         * Enregistrement du Service Worker pour le mode hors-ligne
         */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .catch(err => console.log('Erreur PWA:', err));
            });
        }
    </script>
</body>
</html>
