<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RNG Master Pro</title>
    <style>
        /* RESET TOTAL */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            font-family: sans-serif;
        }

        #content-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #1a1a1a;
        }

        /* BARRE DE NAVIGATION */
        .nav-bar {
            height: 70px;
            background: #121212;
            display: flex;
            width: 100%;
            border-top: 1px solid #333;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888;
            text-decoration: none;
            font-size: 11px;
            transition: 0.2s;
        }

        .nav-item.active {
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.05);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <iframe src="pages/chrono.html" id="content-frame" name="content-frame"></iframe>

    <nav class="nav-bar">
        <a href="pages/config.html" target="content-frame" class="nav-item" onclick="setActive(this)">
            <span class="nav-icon">⚙️</span>
            <span>Config</span>
        </a>
        <a href="pages/chercher.html" target="content-frame" class="nav-item" onclick="setActive(this)">
            <span class="nav-icon">🔍</span>
            <span>Chercher</span>
        </a>
        <a href="pages/chrono.html" target="content-frame" class="nav-item active" onclick="setActive(this)">
            <span class="nav-icon">⏱️</span>
            <span>Chrono</span>
        </a>
    </nav>

    <script>
        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            el.classList.add('active');
        }

        // Écouteur pour recevoir les ordres de changement de page (ex: depuis Chercher vers Chrono)
        window.addEventListener('message', function(event) {
            if (event.data.type === 'setTargetFrame') {
                const frame = document.getElementById('content-frame');
                frame.src = 'pages/chrono.html';
                // On met aussi à jour l'état visuel du bouton Chrono
                setActive(document.querySelectorAll('.nav-item')[2]);
            }
        });
    </script>
</body>
</html>
