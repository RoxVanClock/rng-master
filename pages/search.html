<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .results-scroll { max-height: 450px; overflow-y: auto; margin-top: 15px; border-radius: 8px; background: #111; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        th { position: sticky; top: 0; background: #222; padding: 10px; border-bottom: 2px solid var(--game-color); color: #888; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .shiny-row { background: rgba(255, 215, 0, 0.1) !important; color: gold; font-weight: bold; }
        
        /* Bloc principal repliable */
        .main-config { background: #222; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .main-config > summary { padding: 15px; cursor: pointer; color: var(--game-color); font-weight: bold; list-style: none; }
        .main-config > summary::-webkit-details-marker { display: none; }
        
        .config-body { padding: 0 15px 15px 15px; }
        .method-context { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; margin: 10px 0; border: 1px dashed #444; }
        
        /* Grille des natures */
        .nature-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; 
            padding: 10px; background: #111; border-radius: 8px; max-height: 160px; overflow-y: auto;
        }
        .nature-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #ccc; cursor: pointer; }
        .nature-item input { width: 16px; height: 16px; }

        .btn-search { width: 100%; padding: 12px; margin-top: 15px; background: var(--game-color); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .options-row { display: grid; grid-template-columns: 100px 1fr; gap: 10px; margin-top: 10px; }
        .shiny-toggle { display: flex; align-items: center; justify-content: center; gap: 5px; background: #333; border-radius: 8px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <details class="main-config" open>
        <summary>🔍 CONFIGURATION DE RECHERCHE (Cliquer pour réduire)</summary>
        <div class="config-body">
            <p id="active-info" style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 10px;"></p>

            <div style="display: flex; gap: 10px;">
                <div style="flex:1;"><label>Début</label><input type="number" id="f-start" value="0"></div>
                <div style="flex:1;"><label>Fin</label><input type="number" id="f-end" value="5000"></div>
            </div>

            <label style="margin-top:10px; display:block;">Méthode</label>
            <select id="method" onchange="updateMethodContext()">
                <option value="h1">Méthode H1 (Fixe / Légendaire)</option>
                <option value="h2">Méthode H2 (Sauvage - Émeraude)</option>
                <option value="h4">Méthode H4 (Sauvage - RS/FRLG)</option>
            </select>

            <div id="method-options" class="method-context">
                <div id="h1-options">
                    <label>Cible Statique</label>
                    <select id="h1-target">
                        <option value="Rayquaza">Rayquaza</option>
                        <option value="Kyogre/Groudon">Kyogre / Groudon</option>
                        <option value="Starter">Starter</option>
                    </select>
                </div>
                <div id="h2-h4-options" style="display:none;">
                    <label>Lieu / Route</label>
                    <select id="area-select"></select>
                </div>
            </div>

            <details style="margin-top:10px;">
                <summary style="font-size: 0.85rem; padding: 5px; background: #333; border-radius: 5px; cursor: pointer;">🎭 Filtrer par Natures</summary>
                <div id="nature-list" class="nature-grid"></div>
            </details>

            <div class="options-row">
                <div class="shiny-toggle">
                    <input type="checkbox" id="filter-shiny"> <label for="filter-shiny">✨ Shiny</label>
                </div>
                <button class="btn-search" onclick="generateFrames()">LANCER LA RECHERCHE</button>
            </div>
        </div>
    </details>

    <div id="results-area" class="results-scroll" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Frame</th>
                    <th>Nature</th>
                    <th>IVs (PV/A/D/SA/SD/V)</th>
                    <th>Pokémon</th>
                </tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>

    <script src="data-natures.js"></script>
    <script src="data-locations.js"></script>
    <script src="search.js"></script>
</body>
</html>
