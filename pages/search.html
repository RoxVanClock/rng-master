<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style-core.css">
</head>
<body>
    <div class="card">
        <h3>🔍 Recherche Sauvage</h3>
        <p id="active-info" style="font-size: 0.8rem; color: #ffbc00; margin-top: -10px;"></p>
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Frame Début</label>
                <input type="number" id="f-start" value="0">
            </div>
            <div style="flex: 1;">
                <label>Frame Fin</label>
                <input type="number" id="f-end" value="5000">
            </div>
        </div>

        <label>Méthode de génération</label>
        <select id="method">
            <option value="h1">Méthode H1 (RS Standard)</option>
            <option value="h2">Méthode H2 (Emeraude)</option>
            <option value="h4">Méthode H4 (FRLG)</option>
        </select>

        <button class="btn" onclick="generateFrames()">CALCULER LES RÉSULTATS</button>
    </div>

    <div id="results-area" class="card" style="display:none; padding: 10px; overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; font-size: 0.8rem;">
            <thead>
                <tr style="text-align: left; border-bottom: 1px solid #444;">
                    <th>Frame</th><th>Nature</th><th>Slot</th><th>Shiny</th>
                </tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>

    <script src="../app-core.js"></script>
    <script src="search.js"></script>
</body>
</html>
