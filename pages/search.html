<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .main-config { background: #222; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; overflow: hidden; }
        .main-config summary { 
            padding: 15px; cursor: pointer; color: var(--game-color); 
            font-weight: bold; list-style: none; display: flex; justify-content: space-between; 
        }
        .main-config summary::-webkit-details-marker { display: none; }
        .main-config summary::after { content: '▼'; font-size: 0.8rem; }
        .main-config[open] summary::after { content: '▲'; }
        
        .config-body { padding: 0 15px 15px 15px; }

        /* Natures en une seule colonne comme demandé */
        .nature-list-container {
            background: #111; border-radius: 8px; border: 1px solid #444;
            max-height: 200px; overflow-y: auto; margin: 10px 0;
        }
        .nature-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border-bottom: 1px solid #222; color: #ccc;
        }
        .nature-row input { width: 20px; height: 20px; accent-color: var(--game-color); }

        .banner { padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; border: 1px solid transparent; }
        .results-scroll { max-height: 400px; overflow-y: auto; margin-top: 15px; background: #111; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        th { position: sticky; top: 0; background: #222; padding: 10px; border-bottom: 2px solid var(--game-color); }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <details class="main-config" open>
        <summary>🔍 CONFIGURATION</summary>
        <div class="config-body">
            <div id="profile-banner" class="banner">Vérification du profil...</div>

            <div style="display: flex; gap: 10px;">
                <div style="flex:1;"><label>Début</label><input type="number" id="f-start" value="0"></div>
                <div style="flex:1;"><label>Fin</label><input type="number" id="f-end" value="5000"></div>
            </div>

            <label style="margin-top:10px; display:block;">Méthode</label>
            <select id="method" onchange="updateMethodContext()">
                <option value="h1">Méthode H1 (Fixe / Légendaire)</option>
                <option value="h2">Méthode H2 (Sauvage - Émeraude)</option>
            </select>

            <label style="margin-top:10px; display:block;">Natures</label>
            <div id="nature-list" class="nature-list-container"></div>

            <button class="btn" onclick="generateFrames()" style="width:100%; margin-top:15px;">RECHERCHER</button>
        </div>
    </details>

    <div id="results-area" style="display:none;" class="results-scroll">
        <table>
            <thead><tr><th>Fr</th><th>Nature</th><th>IVs</th><th>Pokémon</th></tr></thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>

    <script src="data-natures.js"></script>
    <script src="search.js"></script>
</body>
</html>
