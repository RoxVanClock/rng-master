<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .results-scroll { max-height: 300px; overflow-y: auto; margin-top: 15px; border-radius: 8px; background: #111; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        th { position: sticky; top: 0; background: #222; padding: 10px; border-bottom: 2px solid var(--game-color); color: #888; }
        td { padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .shiny-row { background: rgba(255, 215, 0, 0.1) !important; color: gold; font-weight: bold; }
        
        /* Menu Accordéon pour les Natures */
        details { background: #333; border-radius: 8px; margin-top: 10px; border: 1px solid #444; }
        summary { padding: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; outline: none; }
        .nature-selector { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; 
            padding: 10px; border-top: 1px solid #444; max-height: 150px; overflow-y: auto;
        }
        .nature-item { font-size: 0.8rem; display: flex; align-items: center; gap: 8px; color: #ccc; }
        
        /* Alignement des options */
        .options-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; align-items: center; }
        .method-context { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px dashed #444; }
        .shiny-box { display: flex; align-items: center; gap: 10px; background: #333; padding: 8px; border-radius: 8px; height: 40px; }
    </style>
</head>
<body>

    <div class="card">
        <h3 style="margin-top:0;">🔍 Recherche de Frames</h3>
        <p id="active-info" style="font-size: 0.8em; opacity: 0.7; margin-bottom: 15px;"></p>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1;"><label>Frame Début</label><input type="number" id="f-start" value="0"></div>
            <div style="flex:1;"><label>Frame Fin</label><input type="number" id="f-end" value="5000"></div>
        </div>

        <label>Méthode</label>
        <select id="method" onchange="updateMethodContext()">
            <option value="h1">Méthode H1 (Fixe / Légendaire)</option>
            <option value="h2">Méthode H2 (Sauvage - Emeraude)</option>
            <option value="h4">Méthode H4 (Sauvage - RS/FRLG)</option>
        </select>

        <div id="method-options" class="method-context">
            <div id="h1-options">
                <label>Cible</label>
                <select id="h1-target">
                    <option value="Rayquaza">Rayquaza</option>
                    <option value="Kyogre/Groudon">Kyogre / Groudon</option>
                    <option value="Starter">Starter</option>
                    <option value="Regis">Regis</option>
                </select>
            </div>
            <div id="h2-h4-options" style="display:none;">
                <label>Lieu / Route</label>
                <select id="area-select" onchange="updatePokemonList()">
                    <option value="route101">Route 101</option>
                    <option value="sky_pillar">Pilier Céleste</option>
                    <option value="safari">Parc Safari</option>
                </select>
            </div>
        </div>

        <details>
            <summary>🎭 Filtrer par Natures</summary>
            <div id="nature-list" class="nature-selector"></div>
        </details>

        <div class="options-row">
            <div class="shiny-box">
                <input type="checkbox" id="filter-shiny" style="width:20px; height:20px; margin:0;">
                <label for="filter-shiny" style="margin:0; font-size: 0.85rem;">✨ Shiny</label>
            </div>
            <button class="btn" onclick="generateFrames()">RECHERCHER</button>
        </div>
    </div>

    <div id="results-area" class="card results-scroll" style="display:none; padding:0;">
        <table>
            <thead>
                <tr>
                    <th>Frame</th>
                    <th>Nature</th>
                    <th>IVs</th>
                    <th>Pokémon</th>
                </tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>

    <script src="../app-core.js"></script>
    <script src="search.js"></script>
</body>
</html>
