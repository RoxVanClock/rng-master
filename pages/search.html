<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .results-scroll { max-height: 350px; overflow-y: auto; margin-top: 15px; border-radius: 8px; background: #111; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        th { position: sticky; top: 0; background: #222; padding: 10px; border-bottom: 2px solid var(--game-color); color: #888; }
        td { padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .shiny-row { background: rgba(255, 215, 0, 0.1) !important; color: gold; font-weight: bold; }
        
        /* Style pour les Natures Multiples */
        .nature-selector { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; 
            max-height: 120px; overflow-y: auto; background: #333; padding: 10px; border-radius: 8px;
        }
        .nature-item { font-size: 0.75rem; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        
        .method-context { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="card">
        <h3>🔍 Recherche Avancée</h3>
        <p id="active-info" style="font-size: 0.8em; opacity: 0.7;"></p>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1;"><label>Frame Début</label><input type="number" id="f-start" value="0"></div>
            <div style="flex:1;"><label>Frame Fin</label><input type="number" id="f-end" value="5000"></div>
        </div>

        <label>Méthode</label>
        <select id="method" onchange="updateMethodContext()">
            <option value="h1">Méthode H1 (Fixe / Légendaire)</option>
            <option value="h2">Méthode H2 (Sauvage - Emeraude)</option>
            <option value="h4">Méthode H4 (Sauvage - RS/FRLG)</option>
        </select>

        <div id="method-options" class="method-context">
            <div id="h1-options">
                <label>Pokémon Fixe</label>
                <select id="h1-target">
                    <option value="rayquaza">Rayquaza</option>
                    <option value="kyogre_groudon">Kyogre / Groudon</option>
                    <option value="starter">Starter</option>
                    <option value="regis">Regis</option>
                </select>
            </div>
            <div id="h2-h4-options" style="display:none;">
                <label>Lieu / Route</label>
                <select id="area-select" onchange="updatePokemonList()">
                    <option value="route101">Route 101</option>
                    <option value="sky_pillar">Pilier Céleste</option>
                </select>
                <p id="pokemon-preview" style="font-size: 0.7rem; color: #888; margin-top: 5px;"></p>
            </div>
        </div>

        <div style="margin-top:10px;">
            <label>Natures (Coche tes choix)</label>
            <div id="nature-list" class="nature-selector"></div>
        </div>

        <div class="checkbox-group" style="margin-top:10px;">
            <input type="checkbox" id="filter-shiny">
            <label for="filter-shiny">✨ Uniquement Shiny</label>
        </div>

        <button class="btn" onclick="generateFrames()">LANCER LA RECHERCHE</button>
    </div>

    <div id="results-area" class="card results-scroll" style="display:none; padding:0;">
        <table>
            <thead>
                <tr>
                    <th>Frame</th>
                    <th>Nature</th>
                    <th>IVs (PV/A/D/SA/SD/V)</th>
                    <th>Slot</th>
                </tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>

    <script src="../app-core.js"></script>
    <script src="search.js"></script>
</body>
