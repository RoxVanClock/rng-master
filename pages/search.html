<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .main-config { background: #1a1a1a; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; overflow: hidden; }
        .main-config summary { 
            padding: 15px; cursor: pointer; color: var(--game-color); 
            font-weight: bold; list-style: none; display: flex; justify-content: space-between; align-items: center;
        }
        .main-config summary::after { content: '▼'; font-size: 0.7rem; }
        .main-config[open] summary::after { content: '▲'; }
        
        .config-body { padding: 0 15px 15px 15px; }

        .profile-status { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; border: 1px solid #444;
            background: rgba(255,255,255,0.05);
        }

        /* Natures en liste verticale propre */
        .nature-scroll {
            background: #111; border-radius: 8px; border: 1px solid #333;
            max-height: 200px; overflow-y: auto; margin: 10px 0;
        }
        .nature-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border-bottom: 1px solid #222; color: #eee;
        }
        .nature-item input { width: 22px; height: 22px; accent-color: var(--game-color); }

        .results-box { margin-top: 15px; background: #111; border-radius: 8px; border: 1px solid #333; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        th { background: #222; padding: 12px; border-bottom: 2px solid var(--game-color); color: #888; }
        td { padding: 12px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <details class="main-config" open>
        <summary>🔍 CONFIGURATION</summary>
        <div class="config-body">
            <div id="status-banner" class="profile-status">
                <span>Initialisation...</span>
                <button onclick="syncNow()" style="background:none; border:1px solid #555; color:white; padding:4px 8px; border-radius:4px; font-size:0.7rem;">ACTUALISER</button>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex:1;"><label>Début</label><input type="number" id="f-start" value="0"></div>
                <div style="flex:1;"><label>Fin</label><input type="number" id="f-end" value="5000"></div>
            </div>

            <label style="margin-top:10px; display:block;">Méthode</label>
            <select id="method">
                <option value="h1">Méthode H1 (Fixe / Légendaire)</option>
                <option value="h2">Méthode H2 (Sauvage - Émeraude)</option>
            </select>

            <label style="margin-top:15px; display:block;">Filtrer par Natures</label>
            <div id="nature-list" class="nature-scroll"></div>

            <button class="btn" onclick="runSearch()" style="width:100%; margin-top:15px; height: 50px; font-weight: bold;">LANCER LA RECHERCHE</button>
        </div>
    </details>

    <div id="results-view" class="results-box" style="display:none;">
        <table>
            <thead>
                <tr><th>Frame</th><th>Nature</th><th>IVs</th><th>Statut</th></tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>

    <script src="data-natures.js"></script>
    <script src="search.js"></script>
</body>
</html>
