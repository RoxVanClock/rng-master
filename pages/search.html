<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .main-config { background: #1a1a1a; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; overflow: hidden; }
        .main-config summary { 
            padding: 15px; cursor: pointer; color: var(--game-color); 
            font-weight: bold; list-style: none; display: flex; justify-content: space-between; align-items: center;
        }
        .main-config summary::after { content: '▼'; font-size: 0.7rem; transition: 0.3s; }
        .main-config[open] summary::after { content: '▲'; }
        
        .config-body { padding: 0 15px 15px 15px; }

        /* Bannière avec bouton Refresh */
        .profile-banner-box { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; border: 1px solid transparent;
        }
        .refresh-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem;
        }

        .nature-list-container {
            background: #111; border-radius: 8px; border: 1px solid #333;
            max-height: 220px; overflow-y: auto; margin: 10px 0;
        }
        .nature-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border-bottom: 1px solid #222; color: #eee;
        }
        .nature-row input { width: 22px; height: 22px; accent-color: var(--game-color); cursor: pointer; }

        .results-area { margin-top: 15px; background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        th { background: #222; padding: 12px; border-bottom: 2px solid var(--game-color); color: #888; }
        td { padding: 12px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <details class="main-config" open>
        <summary>🔍 CONFIGURATION</summary>
        <div class="config-body">
            <div id="profile-banner" class="profile-banner-box">
                <span>Chargement...</span>
                <button class="refresh-btn" onclick="refreshProfileStatus()">🔄 ACTUALISER</button>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex:1;"><label>Début</label><input type="number" id="f-start" value="0"></div>
                <div style="flex:1;"><label>Fin</label><input type="number" id="f-end" value="5000"></div>
            </div>

            <label style="margin-top:10px; display:block;">Méthode</label>
            <select id="method">
                <option value="h1">Méthode H1 (Fixe / Légendaire)</option>
                <option value="h2">Méthode H2 (Sauvage - Émeraude)</option>
            </select>

            <label style="margin-top:15px; display:block;">Filtrer par Natures</label>
            <div id="nature-list" class="nature-list-container"></div>

            <button class="btn" onclick="generateFrames()" style="width:100%; margin-top:10px; height: 50px;">LANCER LA RECHERCHE</button>
        </div>
    </details>

    <div id="results-container" class="results-area" style="display:none;">
        <table>
            <thead>
                <tr><th>Frame</th><th>Nature</th><th>IVs</th><th>Type</th></tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>

    <script src="data-natures.js"></script>
    <script src="search.js"></script>
</body>
</html>
