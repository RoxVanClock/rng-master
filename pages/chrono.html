<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono de Précision - RNG Master</title>
    <link rel="stylesheet" href="../style-core.css">
    <style>
        /* Style spécifique pour le décompte géant */
        #timer-display { 
            font-size: 5rem; 
            font-weight: bold; 
            color: var(--game-color); 
            margin: 20px 0; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center;
        }

        /* Animation de flash pour le feedback visuel */
        @keyframes flashEffect {
            0% { background-color: var(--card); }
            50% { background-color: var(--game-color); }
            100% { background-color: var(--card); }
        }
        .flashing { animation: flashEffect 0.15s ease-in-out; }
        
        /* Classe utilitaire pour inverser la couleur du texte pendant le flash */
        .text-contrast { color: #000 !important; }
    </style>
</head>
<body>

    <div class="card" id="timer-card" style="text-align:center;">
        <h3 id="timer-title">⏱️ Compte à rebours</h3>
        <div id="timer-display">0.000</div>
        
        <label>Frame Cible (GBA)</label>
        <input type="number" id="target-frame" value="300" oninput="updateDisplayFromInput()">
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn" id="start-btn" onclick="toggleTimer()">DÉMARRER</button>
            <button class="btn" style="background:#666;" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <div class="card">
        <h3>⚙️ Paramètres des Bips</h3>
        <label>Déclenchement (sec avant la fin)</label>
        <input type="number" id="alert-seconds" value="2.0" step="0.5" min="0">
        
        <label>Nombre total de bips</label>
        <input type="number" id="alert-count" value="5" min="1">
        
        <div style="margin-top:15px; display: flex; align-items: center; gap: 15px;">
            <label><input type="checkbox" id="sound-on" checked> 🔊 Son</label>
            <label><input type="checkbox" id="vibrate-on"> 📱 Vibreur</label>
        </div>
    </div>

    <script src="../app-core.js"></script>
    <script src="chrono.js"></script>
</body>
</html>
