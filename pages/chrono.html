<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        #timer-display {
            font-size: 4rem;
            text-align: center;
            font-weight: bold;
            color: var(--game-color);
            margin: 20px 0;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="card" id="timer-card">
        <h3>⏱️ Compte à rebours</h3>
        <div id="timer-display">0.000</div>
        
        <label>Frame Cible (GBA)</label>
        <input type="number" id="target-frame" value="300" oninput="updateDisplay()">

        <div style="display: flex; gap: 10px;">
            <button class="btn" id="start-btn" onclick="toggleTimer()" style="flex: 2;">DÉMARRER</button>
            <button class="btn" onclick="resetTimer()" style="flex: 1; background: #555;">RESET</button>
        </div>
    </div>

    <div class="card">
        <h3>⚙️ Paramètres des Bips</h3>
        
        <label>Déclenchement (sec avant la fin)</label>
        <input type="number" id="alert-seconds" value="2.0" step="0.5">

        <label>Nombre total de bips</label>
        <input type="number" id="alert-count" value="5">
        
        <div class="checkbox-group">
            <label><input type="checkbox" id="sound-on" checked> 🔊 Son</label>
            <label><input type="checkbox" id="vibrate-on"> 📱 Vibreur</label>
        </div>
    </div>

    <script src="../app-core.js"></script>
    <script src="chrono.js"></script>
</body>
</html>
