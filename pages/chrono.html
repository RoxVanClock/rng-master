<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        /* La zone du chrono avec le flash intégré */
        .chrono-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 50%;
            background: #222;
            border: 8px solid var(--game-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #flash-circle {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 2;
        }
        .timer-display { 
            font-size: 3rem; 
            font-family: monospace; 
            color: var(--game-color); 
            font-weight: bold;
            z-index: 3;
        }
        .phase-name { font-size: 0.8rem; color: #888; z-index: 3; text-transform: uppercase; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card" style="text-align: center;">
        <div class="chrono-container">
            <div id="flash-circle"></div>
            <div class="phase-name" id="phase-label">PRÊT</div>
            <div class="timer-display" id="timer-val">0.000</div>
        </div>
        <div style="color: #666; font-size: 0.9rem;">PHASE COMPTÉE: <span id="count-val" style="color:var(--game-color); font-weight:bold;">0</span></div>
    </div>

    <div class="card">
        <div class="grid-inputs">
            <div>
                <label>Pre-Timer (ms)</label>
                <input type="number" id="pre-timer" value="0">
            </div>
            <div>
                <label>Calibration</label>
                <input type="number" id="calibration" value="0">
            </div>
        </div>
        
        <label>Target Frame</label>
        <input type="number" id="target-frame" value="1000">

        <div class="settings-grid">
            <div>
                <label>Bips (Nb)</label>
                <input type="number" id="beep-count" value="5">
            </div>
            <div>
                <label>Interval (ms)</label>
                <input type="number" id="beep-interval" value="500">
            </div>
            <div style="display:flex; justify-content: space-around; align-items: center; padding-top: 20px;">
                <label><input type="checkbox" id="enable-vibrate" checked> 📳</label>
                <label><input type="checkbox" id="enable-sound" checked> 🔊</label>
            </div>
        </div>

        <button class="btn" id="start-btn" onclick="window.toggleTimer()" style="margin-top:20px;">START / STOP</button>
    </div>

    <div class="card">
        <h3>🎯 Calibration Rapide</h3>
        <label>Frame Hit</label>
        <input type="number" id="frame-hit" placeholder="Ex: 1002">
        <button class="btn" style="background: #444; margin-top: 10px;" onclick="window.updateCalibration()">UPDATE CALIBRATION</button>
        <button class="btn" onclick="window.resetCounter()" style="background:transparent; color:#666; font-size:0.8rem; margin-top:5px; border:none;">Réinitialiser Compteur</button>
    </div>

    <script src="../app-core.js"></script>
    <script src="chrono.js"></script>
</body>
</html>
