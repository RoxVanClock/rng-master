<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 9999;
        }
        .timer-display { 
            font-size: 5rem; text-align: center; font-family: monospace; 
            margin: 10px 0; color: var(--game-color); font-weight: bold; 
        }
        .stats-row { display: flex; justify-content: space-around; align-items: center; margin-bottom: 15px; color: #888; }
        .stat-val { color: var(--game-color); font-weight: bold; font-size: 1.2rem; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkbox-row { display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>

    <div class="card">
        <div class="stats-row">
            <div>PHASE: <span id="count-val" class="stat-val">0</span></div>
            <div id="phase-label" style="text-transform: uppercase; font-weight: bold;">PRÊT</div>
        </div>
        <div class="timer-display" id="timer-val">0.000</div>
    </div>

    <div class="card">
        <h3>⏱️ Configuration</h3>
        <div class="grid-inputs">
            <div>
                <label>Pre-Timer (ms)</label>
                <input type="number" id="pre-timer" value="0">
            </div>
            <div>
                <label>Calibration (ms)</label>
                <input type="number" id="calibration" value="0">
            </div>
        </div>
        
        <div class="grid-inputs">
            <div>
                <label>Target Frame</label>
                <input type="number" id="target-frame" value="1000">
            </div>
            <div>
                <label>Intervalle (s)</label>
                <input type="number" id="interval-val" value="0" step="0.1">
            </div>
        </div>

        <div class="grid-inputs">
            <div>
                <label>Bips fin (s)</label>
                <input type="number" id="beep-count" value="2">
            </div>
            <div class="checkbox-row">
                <label><input type="checkbox" id="enable-vibrate" checked> 📳</label>
                <label><input type="checkbox" id="enable-sound" checked> 🔊</label>
            </div>
        </div>

        <button class="btn" id="start-btn" onclick="window.toggleTimer()" style="margin-top:10px;">DÉMARRER</button>
        <button class="btn" onclick="window.resetCounter()" style="background:#444; margin-top:10px;">RÉINITIALISER COMPTEUR</button>
    </div>

    <div class="card">
        <h3>🎯 Calibration</h3>
        <label>Frame Hit</label>
        <input type="number" id="frame-hit" placeholder="Ex: 1002">
        <button class="btn" style="background: #333;" onclick="window.updateCalibration()">🔄 UPDATE CALIBRATION</button>
    </div>

    <script src="../app-core.js"></script>
    <script src="chrono.js"></script>
</body>
</html>
