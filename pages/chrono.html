<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .timer-display {
            font-size: 4.5rem;
            text-align: center;
            font-family: 'Courier New', monospace;
            margin: 20px 0;
            color: var(--game-color);
            font-weight: bold;
        }
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        #phase-label {
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
            height: 1.2rem;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="phase-label" style="color: #888;">PRÊT</div>
        <div class="timer-display" id="timer-val">0.00</div>
    </div>

    <div class="card">
        <h3>⏱️ Réglages Timer</h3>
        <div class="grid-inputs">
            <div>
                <label>Pre-Timer (ms)</label>
                <input type="number" id="pre-timer" value="0" placeholder="0">
            </div>
            <div>
                <label>Calibration (ms)</label>
                <input type="number" id="calibration" value="0" placeholder="0">
            </div>
        </div>
        
        <label>Target Frame</label>
        <input type="number" id="target-frame" value="1000">

        <button class="btn" id="start-btn" onclick="window.toggleTimer()">DÉMARRER</button>
    </div>

    <div class="card">
        <h3>🎯 Calibration</h3>
        <label>Frame Hit (le cadre obtenu)</label>
        <input type="number" id="frame-hit" placeholder="Ex: 1002">
        
        <button class="btn" style="background: #444; margin-top: 10px;" onclick="window.updateCalibration()">🔄 UPDATE CALIBRATION</button>
    </div>

    <script src="../app-core.js"></script>
    <script src="chrono.js"></script>
</body>
</html>
