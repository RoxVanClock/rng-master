<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .chrono-container {
            position: relative; width: 220px; height: 220px;
            margin: 15px auto; border-radius: 50%;
            background: #111; border: 6px solid var(--game-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #flash-circle {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 2;
        }
        .timer-display { font-size: 3.2rem; font-family: monospace; color: var(--game-color); font-weight: bold; z-index: 3; }
        .phase-name { font-size: 0.9rem; color: #888; z-index: 3; text-transform: uppercase; }
        #duration-info { font-size: 0.75rem; color: #555; margin-top: 5px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card" style="text-align: center;">
        <div class="chrono-container">
            <div id="flash-circle"></div>
            <div class="phase-name" id="phase-label">PRÊT</div>
            <div class="timer-display" id="timer-val">0.000</div>
        </div>
        <div id="duration-info">Durée : 0 ms</div>
    </div>

    <div class="card">
        <div class="grid-inputs">
            <div>
                <label>Target Frame</label>
                <input type="number" id="target-frame" value="1000" oninput="window.updateTargetInfo()">
            </div>
            <div>
                <label>Calibration</label>
                <input type="number" id="calibration" value="0" oninput="window.updateTargetInfo()">
            </div>
        </div>

        <div class="grid-inputs">
            <div>
                <label>Bips (Total)</label>
                <input type="number" id="beep-count" value="5">
            </div>
            <div>
                <label>Début Bips (s)</label>
                <input type="number" id="beep-start" value="2" step="0.1">
            </div>
        </div>

        <div class="grid-inputs">
            <div>
                <label>Type de Son</label>
                <select id="beep-type" style="width:100%; padding:8px; border-radius:4px; background:#333; color:white; border:none;">
                    <option value="square">Retro (GBA)</option>
                    <option value="sine">Doux</option>
                    <option value="sawtooth">Tranchant</option>
                </select>
            </div>
            <div style="display:flex; flex-direction:column; justify-content:flex-end;">
                <label>Pre-Timer (ms)</label>
                <input type="number" id="pre-timer" value="0">
            </div>
        </div>

        <button class="btn" id="start-btn" onclick="window.toggleTimer()" style="margin-top:20px;">DÉMARRER</button>
    </div>

    <div class="card">
        <h3>🎯 Calibration Rapide</h3>
        <label>Frame Hit</label>
        <input type="number" id="frame-hit" placeholder="Ex: 1002">
        <button class="btn" style="background: #444; margin-top: 10px;" onclick="window.updateCalibration()">AJUSTER</button>
        <button class="btn" onclick="window.resetCounter()" style="background:transparent; color:#666; font-size:0.8rem; margin-top:10px; border:none;">Reset Essais (<span id="count-val">0</span>)</button>
    </div>

    <script src="../app-core.js"></script>
    <script src="chrono.js"></script>
</body>
</html>
