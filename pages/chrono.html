<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .chrono-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 15px auto;
            border-radius: 50%;
            background: #1a1a1a;
            border: 6px solid var(--game-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        #flash-circle {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 2;
        }
        .timer-display { font-size: 3.2rem; font-family: monospace; color: var(--game-color); font-weight: bold; z-index: 3; }
        .phase-name { font-size: 0.9rem; color: #888; z-index: 3; text-transform: uppercase; margin-bottom: 5px; }
        #duration-info { font-size: 0.75rem; color: #555; margin-top: 5px; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card" style="text-align: center;">
        <div class="chrono-container">
            <div id="flash-circle"></div>
            <div class="phase-name" id="phase-label">PRÊT</div>
            <div class="timer-display" id="timer-val">0.000</div>
        </div>
        <div id="duration-info">Durée cible : 0 ms</div>
        <div style="margin-top: 10px; color: #666; font-size: 0.9rem;">ESSAI N° <span id="count-val" style="color:var(--game-color); font-weight:bold;">0</span></div>
    </div>

    <div class="card">
        <div class="grid-inputs">
            <div>
                <label>Pre-Timer (ms)</label>
                <input type="number" id="pre-timer" value="0">
            </div>
            <div>
                <label>Calibration</label>
                <input type="number" id="calibration" value="0">
            </div>
        </div>
        
        <label>Target Frame</label>
        <input type="number" id="target-frame" value="1000" oninput="window.updateTargetInfo()">

        <div class="grid-inputs">
            <div>
                <label>Bips (Nombre)</label>
                <input type="number" id="beep-count" value="5">
            </div>
            <div>
                <label>Déclenchement (s)</label>
                <input type="number" id="beep-start" value="2" step="0.1">
            </div>
        </div>

        <button class="btn" id="start-btn" onclick="window.toggleTimer()" style="margin-top:20px;">DÉMARRER</button>
    </div>

    <div class="card">
        <h3>🎯 Calibration</h3>
        <label>Frame Hit</label>
        <input type="number" id="frame-hit" placeholder="Cadre obtenu">
        <button class="btn" style="background: #444; margin-top: 10px;" onclick="window.updateCalibration()">AJUSTER CALIBRATION</button>
        <button class="btn" onclick="window.resetCounter()" style="background:transparent; color:#666; font-size:0.8rem; margin-top:10px; border:none;">Reset Compteur</button>
    </div>

    <script src="../app-core.js"></script>
    <script src="chrono.js"></script>
</body>
</html>
