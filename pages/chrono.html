<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .timer-display {
            font-size: 4rem;
            text-align: center;
            font-family: monospace;
            margin: 20px 0;
            color: var(--game-color);
        }
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="timer-display" id="timer-val">0.00</div>
        <div id="phase-label" style="text-align: center; color: #888; font-weight: bold;">PRÊT</div>
    </div>

    <div class="card">
        <h3>⏱️ Réglages Timer</h3>
        <div class="grid-inputs">
            <div>
                <label>Pre-Timer (ms)</label>
                <input type="number" id="pre-timer" value="0">
            </div>
            <div>
                <label>Calibration (ms)</label>
                <input type="number" id="calibration" value="0" step="1">
            </div>
        </div>
        
        <label>Target Frame</label>
        <input type="number" id="target-frame" value="1000">

        <button class="btn" id="start-btn" onclick="toggleTimer()">DÉMARRER</button>
    </div>

    <div class="card">
        <h3>🎯 Calibration</h3>
        <label>Frame Hit (le cadre obtenu)</label>
        <input type="number" id="frame-hit" placeholder="Ex: 1002">
        <button class="btn" style="background: #444; margin-top: 10px;" onclick="updateCalibration()">🔄 UPDATE CALIBRATION</button>
    </div>

    <script src="../app-core.js"></script>
    <script src="chrono.js"></script>
</body>
</html>
