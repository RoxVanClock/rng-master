<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .chrono-container {
            position: relative; width: 220px; height: 220px;
            margin: 15px auto; border-radius: 50%;
            background: #111; border: 6px solid var(--game-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #flash-circle {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 2;
        }
        .timer-display { font-size: 3.2rem; font-family: monospace; color: var(--game-color); font-weight: bold; z-index: 3; }
        .phase-name { font-size: 0.9rem; color: #888; z-index: 3; text-transform: uppercase; }
        #duration-info { text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 10px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="duration-info">Durée cible : 0 ms</div>
        <div class="chrono-container">
            <div id="flash-circle"></div>
            <div id="phase-label" class="phase-name">PRÊT</div>
            <div id="timer-val" class="timer-display">0.000</div>
            <div style="color: #444; font-size: 0.8rem;">COUNT: <span id="count-val">0</span></div>
        </div>

        <div class="grid-inputs">
            <div>
                <label>Target Frame</label>
                <input type="number" id="target-frame" value="300" oninput="window.updateTargetInfo()">
            </div>
            <div>
                <label>Calibration (ms)</label>
                <input type="number" id="calibration" value="0" oninput="window.updateTargetInfo()">
            </div>
        </div>

        <div class="grid-inputs">
            <div>
                <label>Bips</label>
                <input type="number" id="num-beeps" value="5">
            </div>
            <div>
                <label>Début Bips (s)</label>
                <input type="number" id="beep-start" value="2">
            </div>
        </div>

        <div class="grid-inputs">
            <div>
                <label>Type de Son</label>
                <select id="beep-type">
                    <option value="square">Retro (GBA)</option>
                    <option value="sine">Doux</option>
                    <option value="sawtooth">Tranchant</option>
                </select>
            </div>
            <div>
                <label>Pre-Timer (ms)</label>
                <input type="number" id="pre-timer" value="0">
            </div>
        </div>

        <button class="btn" id="start-btn" onclick="window.toggleTimer()" style="margin-top:20px;">DÉMARRER</button>
    </div>

    <div class="card">
        <h3>🎯 Calibration Rapide</h3>
        <label>Frame Hit</label>
        <input type="number" id="frame-hit" placeholder="Ex: 302">
        <button class="btn" style="background: #444; margin-top: 10px;" onclick="window.updateCalibration()">AJUSTER LA CALIBRATION</button>
    </div>

    <script src="chrono.js"></script>
</body>
</html>
