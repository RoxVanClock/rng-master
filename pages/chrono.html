<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../style-core.css">
    <style>
        .timer-display { font-size: 4rem; text-align: center; font-family: monospace; margin: 10px 0; color: var(--game-color); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stats-row { display: flex; justify-content: space-around; margin-bottom: 15px; color: #888; font-size: 0.9rem; }
        .stat-val { color: var(--game-color); font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="stats-row">
            <div>PHASE: <span id="count-val" class="stat-val">0</span></div>
            <div id="phase-label">PRÊT</div>
        </div>
        <div class="timer-display" id="timer-val">0.00</div>
    </div>

    <div class="card">
        <h3>⏱️ Configuration</h3>
        <div class="grid-inputs">
            <div>
                <label>Pre-Timer (ms)</label>
                <input type="number" id="pre-timer" value="0">
            </div>
            <div>
                <label>Calibration (ms)</label>
                <input type="number" id="calibration" value="0">
            </div>
        </div>
        
        <div class="grid-inputs">
            <div>
                <label>Target Frame</label>
                <input type="number" id="target-frame" value="1000">
            </div>
            <div>
                <label>Intervalle (s)</label>
                <input type="number" id="interval-val" value="0" step="0.1">
            </div>
        </div>

        <div class="checkbox-group" style="margin-top:10px; padding:10px;">
            <input type="checkbox" id="enable-vibrate" checked>
            <label for="enable-vibrate">📳 Vibrations</label>
            <input type="checkbox" id="enable-sound" style="margin-left:20px;">
            <label for="enable-sound">🔊 Bips</label>
        </div>

        <button class="btn" id="start-btn" onclick="window.toggleTimer()">DÉMARRER</button>
        <button class="btn" style="background:#444; margin-top:10px;" onclick="window.resetCounter()">RÉINITIALISER COMPTEUR</button>
    </div>

    <div class="card">
        <h3>🎯 Calibration</h3>
        <label>Frame Hit</label>
        <input type="number" id="frame-hit" placeholder="Ex: 1002">
        <button class="btn" style="background: #333;" onclick="window.updateCalibration()">🔄 UPDATE CALIBRATION</button>
    </div>

    <script src="../app-core.js"></script>
    <script src="chrono.js"></script>
</body>
</html>
