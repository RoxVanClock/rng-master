<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../style-core.css">
</head>
<body>
    <div class="card" id="form-card">
        <h3 id="form-title">👤 Nouveau Profil</h3>
        <input type="hidden" id="edit-id"> 
        
        <label>Nom du profil</label>
        <input type="text" id="prof-name" placeholder="Ex: Emeraude Shiny">
        
        <label>Jeu GBA</label>
        <select id="prof-game">
            <option value="emerald">Pokémon Émeraude</option>
            <option value="ruby">Pokémon Rubis</option>
            <option value="sapphire">Pokémon Saphir</option>
            <option value="fr">Pokémon Rouge Feu</option>
            <option value="lg">Pokémon Vert Feuille</option>
        </select>

        <div class="checkbox-group">
            <input type="checkbox" id="prof-dead-battery">
            <label for="prof-dead-battery">🪫 Pile morte / Émeraude (Seed 0)</label>
        </div>

        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>TID</label>
                <input type="number" id="prof-tid" placeholder="12345">
            </div>
            <div style="flex: 1;">
                <label>SID</label>
                <input type="number" id="prof-sid" placeholder="54321">
            </div>
        </div>

        <button class="btn" id="save-btn" onclick="saveProfile()">💾 ENREGISTRER LE PROFIL</button>
    </div>

    <div class="card" id="active-profile-display" style="display:none; border: 2px solid var(--game-color); background: rgba(46, 204, 113, 0.05);">
        <h3 style="font-size: 0.9rem; margin-bottom: 5px; color: var(--game-color);">⭐ PROFIL ACTIF</h3>
        <div id="active-info"></div>
    </div>

    <div class="card">
        <h3>📂 Liste des Profils</h3>
        <p style="font-size: 0.75rem; color: #888; margin-bottom: 10px;">Touchez un profil pour l'activer.</p>
        <div id="profile-list"></div>
    </div>

    <div class="card">
        <h3>🛠️ Sauvegarde</h3>
        <div style="display: flex; gap: 10px;">
            <button class="btn" onclick="exportProfiles()" style="background: #444; flex: 1;">EXPORT</button>
            <button class="btn" onclick="importProfiles()" style="background: #444; flex: 1;">IMPORT</button>
        </div>
        <input type="file" id="import-file" style="display:none" onchange="handleFileSelect(event)">
    </div>

    <script src="../app-core.js"></script>
    <script src="config.js"></script>
</body>
</html>
